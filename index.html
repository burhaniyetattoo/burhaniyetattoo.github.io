<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND EFFECT */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 80px 20px 40px;
}

header h1 {
    font-size: 42px;
    letter-spacing: 2px;
    animation: fadeDown 1.2s ease;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
    animation: fadeDown 1.6s ease;
}

/* SCROLL ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(60px);
    transition: all 1s ease;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* PRICE GRID */
.prices {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px 20px;
}

/* BUBBLE STYLE */
.bubble {
    width: 220px;
    padding: 30px;
    border-radius: 40px;
    background: linear-gradient(145deg, #1c1c1c, #2a2a2a);
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

.bubble::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: rotate(45deg);
    top: -100%;
    left: -100%;
    transition: 0.6s;
}

.bubble:hover::before {
    top: 100%;
    left: 100%;
}

.bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 0 35px rgba(255,255,255,0.2);
}

.bubble h3 {
    font-size: 18px;
    margin-bottom: 10px;
}

.bubble p {
    font-size: 20px;
    font-weight: bold;
}

/* INSTAGRAM BUTTON */
.contact {
    text-align: center;
    margin: 60px 20px;
}

.btn {
    padding: 18px 40px;
    border-radius: 50px;
    background: linear-gradient(45deg, #e1306c, #ff7a18);
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.3s;
    display: inline-block;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* FOOTER */
footer {
    text-align: center;
    opacity: 0.5;
    padding: 30px;
    font-size: 14px;
}

/* ANIMATIONS */
@keyframes fadeDown {
    from {opacity: 0; transform: translateY(-50px);}
    to {opacity: 1; transform: translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
    header h1 {
        font-size: 28px;
    }

    .bubble {
        width: 85%;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <h1>Burhaniye Tattoo</h1>
    <p>Sanatını tenine taşı</p>
</header>

<section class="prices">

<div class="bubble hidden">
<h3>Minimal Dövme</h3>
<p>1000 ₺</p>
</div>

<div class="bubble hidden">
<h3>Yarım Kol Ön Yüz</h3>
<p>8000 ₺</p>
</div>

<div class="bubble hidden">
<h3>Yarım Kol Komple</h3>
<p>15000 ₺</p>
</div>

<div class="bubble hidden">
<h3>Tam Kol</h3>
<p>30000 ₺</p>
</div>

<div class="bubble hidden">
<h3>Yarım Omuz</h3>
<p>15000 ₺</p>
</div>

<div class="bubble hidden">
<h3>Dövme Silme</h3>
<p>1500 - 3000 ₺</p>
</div>

</section>

<div class="contact">
<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="btn">
İletişim için Instagram'a Git
</a>
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>
/* SCROLL ANIMATION */
const elements = document.querySelectorAll('.hidden');

window.addEventListener('scroll', () => {
    elements.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 50){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
