<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* 🔥 BACKGROUND FIX (SENKRON + FULL) */
body::before{
content:"";
position:fixed;
top:-5%;
left:-5%;
width:110%;
height:110%;

background:url('bg.jpg') center center no-repeat;
background-size:cover;

/* 🔥 SADECE SCALE (kayma yok artık) */
animation:bgZoom 20s ease-in-out infinite alternate;

z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,25,0,0.85);
z-index:-1;
}

/* 🔥 YUMUŞAK ZOOM */
@keyframes bgZoom{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

/* FADE */
.fade{opacity:0;transform:translateY(30px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}

/* HEADER */
header{padding:60px 20px;}

.logo-img{
width:180px;
filter: drop-shadow(0 0 10px #00ff88);
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

/* BUTTON */
.btn{
padding:14px 22px;
border-radius:30px;
background:#00cc66;
color:white;
box-shadow:0 0 10px #00ff88;
border:none;
cursor:pointer;
}

/* SHAKE */
.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* SECTION */
.section{
padding:25px;
margin:15px;
border-radius:20px;
background:rgba(0,20,0,0.5);
backdrop-filter:blur(10px);
}

select{
padding:12px;
border-radius:10px;
background:#001a00;
color:white;
border:1px solid #00ff88;
margin:5px;
}

/* WARNING */
.warning{
color:#ff4d4d;
margin-top:10px;
display:none;
}

/* RESULT */
#result{
margin-top:20px;
font-size:22px;
color:#00ff88;
}

/* LOADING */
.loading-box{display:none;margin-top:20px;}
.needle{
font-size:30px;
animation:needleMove 0.6s infinite alternate;
}
@keyframes needleMove{
from{transform:translateY(0);}
to{transform:translateY(8px);}
}

.progress{
width:80%;
height:6px;
background:#002b1a;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}
.progress-bar{
height:100%;
background:#00ff88;
animation:loadBar 1.2s linear forwards;
}
@keyframes loadBar{
0%{width:0;}
100%{width:100%;}
}

/* NOTE */
.note{
margin-top:10px;
font-size:14px;
color:#ccc;
opacity:0;
}
.note.show{opacity:1;}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.gallery img{
width:30%;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff88;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
.fullscreen img{width:90%;}

/* MOBILE */
@media(max-width:768px){
.gallery img{width:100%;}
.logo-img{width:140px;}
}

footer{
padding:20px;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<header class="fade">
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
</header>

<section class="section fade">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<select id="style">
<option value="">Stil</option>
<option value="yazi">Yazı</option>
<option value="normal">Normal</option>
<option value="detayli">Detaylı</option>
<option value="golgeli">Gölgeli</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn" id="calcBtn">Fiyat Hesapla</button>

<p class="warning" id="warn">Lütfen tüm seçimleri yapın!</p>

<div id="loadingBox" class="loading-box">
<div class="needle">💉</div>
<div>Fiyat hesaplanıyor...</div>
<div class="progress"><div class="progress-bar"></div></div>
</div>

<h3 id="result"></h3>

<p id="note" class="note">
Bu fiyatlar dövme modeline göre değişebilir. En doğru fiyat için bize ulaşın.
</p>

</section>

<section class="section fade">
<h2>Örnek Dövmeler</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
</div>

</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>

// SCROLL
const observer=new IntersectionObserver(e=>{
e.forEach(i=>{if(i.isIntersecting)i.target.classList.add("show")});
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

// FULLSCREEN
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}
function closeFull(){
document.getElementById("full").style.display="none";
}

// PRICE
function calcPrice(){

let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

let warn=document.getElementById("warn");
let btn=document.getElementById("calcBtn");

if(!size || !style){
warn.style.display="block";
btn.classList.add("shake");
setTimeout(()=>btn.classList.remove("shake"),400);
return;
}

warn.style.display="none";

document.getElementById("result").innerHTML="";
document.getElementById("note").classList.remove("show");

let box=document.getElementById("loadingBox");
box.style.display="block";

setTimeout(()=>{

let min=0,max=0;

if(size==="minimal"){min=900;max=1000;}

if(size==="kucuk"){
if(style==="detayli"||style==="golgeli"){min=2500;max=3000;}
else{min=2000;max=3000;}
}

if(size==="orta"){
if(style==="yazi"){min=2000;max=4000;}
else if(style==="normal"){min=3000;max=4000;}
else{min=3500;max=5000;}
}

if(size==="buyuk"){
if(style==="yazi"){min=7000;max=9000;}
else if(style==="normal"){min=8000;max=11000;}
else if(style==="detayli"){min=9000;max=15000;}
else if(style==="golgeli"){min=9000;max=12000;}
}

box.style.display="none";

document.getElementById("result").innerHTML=
"Yaklaşık Fiyat: "+min+" - "+max+" ₺";

document.getElementById("note").classList.add("show");

},1200);

}

</script>

</body>
</html>
