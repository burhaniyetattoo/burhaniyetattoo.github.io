<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px;
}

header h1{
font-size:40px;
animation:fadeDown 1s;
}

/* BUBBLES */
.prices{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.bubble{
width:220px;
padding:25px;
border-radius:40px;
background:#1a1a1a;
cursor:pointer;
transition:.3s;
}

.bubble:hover{
transform:scale(1.1);
background:#2a2a2a;
}

.bubble h3{margin-bottom:10px}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.popup img{
width:80%;
max-width:400px;
border-radius:20px;
margin:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* BUTTON */
.btn{
display:inline-block;
margin:40px;
padding:15px 30px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}

/* ANIM */
@keyframes fadeDown{
from{opacity:0;transform:translateY(-40px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<h1>Burhaniye Tattoo</h1>
</header>

<section class="prices">

<div class="bubble" onclick="openGallery('minimal')">
<h3>Minimal Dövme</h3>
<p>1000 ₺</p>
</div>

<div class="bubble" onclick="openGallery('half')">
<h3>Yarım Kol Ön Yüz</h3>
<p>8000 ₺</p>
</div>

<div class="bubble" onclick="openGallery('fullhalf')">
<h3>Yarım Kol Komple</h3>
<p>15000 ₺</p>
</div>

<div class="bubble" onclick="openGallery('full')">
<h3>Tam Kol</h3>
<p>30000 ₺</p>
</div>

<div class="bubble" onclick="openGallery('shoulder')">
<h3>Yarım Omuz</h3>
<p>15000 ₺</p>
</div>

<div class="bubble" onclick="openGallery('remove')">
<h3>Dövme Silme</h3>
<p>1500 - 3000 ₺</p>
</div>

</section>

<div style="text-align:center;">
<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="btn">
Instagram’dan İletişim
</a>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<span class="close" onclick="closeGallery()">✖</span>
<div id="gallery"></div>
</div>

<script>
const images = {
minimal:[
"https://source.unsplash.com/400x400/?minimal,tattoo",
"https://source.unsplash.com/401x400/?small,tattoo",
"https://source.unsplash.com/402x400/?tiny,tattoo"
],
half:[
"https://source.unsplash.com/400x400/?half,sleeve,tattoo",
"https://source.unsplash.com/401x400/?arm,tattoo",
"https://source.unsplash.com/402x400/?black,grey,tattoo"
],
fullhalf:[
"https://source.unsplash.com/400x400/?sleeve,tattoo",
"https://source.unsplash.com/401x400/?tattoo,arm",
"https://source.unsplash.com/402x400/?ink,arm"
],
full:[
"https://source.unsplash.com/400x400/?full,sleeve,tattoo",
"https://source.unsplash.com/401x400/?realistic,tattoo",
"https://source.unsplash.com/402x400/?tattoo,design"
],
shoulder:[
"https://source.unsplash.com/400x400/?shoulder,tattoo",
"https://source.unsplash.com/401x400/?upper,arm,tattoo",
"https://source.unsplash.com/402x400/?tattoo,shoulder"
],
remove:[
"https://source.unsplash.com/400x400/?laser,tattoo",
"https://source.unsplash.com/401x400/?tattoo,removal",
"https://source.unsplash.com/402x400/?skin,laser"
]
};

function openGallery(type){
let popup=document.getElementById("popup");
let gallery=document.getElementById("gallery");

gallery.innerHTML="";

images[type].forEach(src=>{
let img=document.createElement("img");
img.src=src;
gallery.appendChild(img);
});

popup.style.display="flex";
}

function closeGallery(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
