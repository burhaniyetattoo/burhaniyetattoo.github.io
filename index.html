<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
background:url('https://images.unsplash.com/photo-1542728928-1413d1894ed1') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:-1;
}

.logo-img{
width:220px;
margin-bottom:15px;
filter: drop-shadow(0 0 10px #e1306c)
        drop-shadow(0 0 20px #e1306c);
}

header{padding:60px 20px;}

.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
box-shadow:0 0 10px #e1306c;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #e1306c;
}

/* SELECT NEON */
select{
padding:12px;
border-radius:10px;
margin:5px;
background:#111;
color:white;
border:1px solid #e1306c;
box-shadow:0 0 10px #e1306c inset;
}

.section{
padding:30px 20px;
background:rgba(0,0,0,0.6);
margin:20px;
border-radius:20px;
}

/* RESULT */
#result{
margin-top:20px;
font-size:22px;
color:#ff4da6;
text-shadow:0 0 10px #e1306c,
            0 0 20px #e1306c;
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.gallery img{
width:45%;
max-width:250px;
border-radius:15px;
cursor:pointer;
}

.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen img{width:90%;max-width:500px;}

footer{
padding:30px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Rezervasyon</a>
</header>

<!-- FİYAT -->
<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size" onchange="checkMinimal()">
<option value="">Boyut Seç</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<br>

<select id="style">
<option value="">Stil Seç</option>
<option value="realistik">Realistik</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn">Fiyat Hesapla</button>

<h3 id="result"></h3>
</section>

<!-- GALERİ -->
<section class="section">
<h2>Örnek Dövmelerimiz</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
</div>
</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeFull(){
document.getElementById("full").style.display="none";
}

// 🔥 Minimal seçilince stil kapanır
function checkMinimal(){
let size=document.getElementById("size").value;
let style=document.getElementById("style");

if(size=="minimal"){
style.style.display="none";
}else{
style.style.display="inline-block";
}
}

function calcPrice(){
let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

if(size==""){
document.getElementById("result").innerHTML="Seçim yap!";
return;
}

let min=0,max=0;

if(size=="minimal"){
min=1000;
max=1500;
}

if(size=="kucuk"){
min=2000;
max=2500;
}

if(size=="orta"){
min=2500;
max=4500;
}

if(size=="buyuk"){
min=10000;
max=15000;
}

// realistik ek ücret
if(style=="realistik"){
min+=500;
max+=1000;
}

animatePrice(min,max);
}

// 🔥 ANİMASYON
function animatePrice(min,max){
let result=document.getElementById("result");
let text="Yaklaşık Fiyat: "+min+" - "+max+" ₺";

result.innerHTML="";
let i=0;

let interval=setInterval(()=>{
result.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},25);
}
</script>

</body>
</html>
