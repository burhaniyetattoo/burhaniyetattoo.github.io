<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
background:url('https://images.unsplash.com/photo-1542728928-1413d1894ed1') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:-1;
}

.logo-img{
width:220px;
margin-bottom:15px;
filter: drop-shadow(0 0 10px #e1306c);
}

header{padding:60px 20px;}

.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}

.section{
padding:30px 20px;
background:rgba(0,0,0,0.6);
margin:20px;
border-radius:20px;
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.gallery img{
width:45%;
max-width:250px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* ADMIN PANEL */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
padding:20px;
overflow:auto;
}

.admin h2{
color:#ff4da6;
text-shadow:0 0 10px #e1306c;
}

.admin input{
margin:10px;
}

.admin button{
padding:10px 20px;
background:#e1306c;
border:none;
color:white;
border-radius:10px;
margin:5px;
}

.drop{
border:2px dashed #e1306c;
padding:20px;
margin:20px;
border-radius:15px;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen img{width:90%;max-width:500px;}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Rezervasyon</a>
</header>

<section class="section">
<h2>Örnek Dövmelerimiz</h2>
<div class="gallery" id="gallery"></div>
</section>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
<h2>Admin Panel</h2>

<input type="file" id="fileInput">
<button onclick="addImage()">Foto Ekle</button>

<div class="drop" id="dropZone">
Sürükle bırak ile foto ekle
</div>

<br>
<button onclick="clearAll()">Tümünü Sil</button>
<button onclick="closeAdmin()">Kapat</button>

</div>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<script>

// ADMIN AÇ
if(window.location.hash === "#admin"){
document.getElementById("adminPanel").style.display="block";
}

// LOCAL STORAGE YÜKLE
function loadImages(){
let data = JSON.parse(localStorage.getItem("images") || "[]");
data.forEach(src => createImage(src));
}

// FOTO EKLE
function addImage(){
let file = document.getElementById("fileInput").files[0];
if(!file) return;

let reader = new FileReader();
reader.onload = function(e){
saveImage(e.target.result);
}
reader.readAsDataURL(file);
}

// KAYDET
function saveImage(src){
let data = JSON.parse(localStorage.getItem("images") || "[]");
data.push(src);
localStorage.setItem("images", JSON.stringify(data));
createImage(src);
}

// GALERİYE EKLE
function createImage(src){
let img = document.createElement("img");
img.src = src;

img.onclick = function(){
if(window.location.hash === "#admin"){
if(confirm("Silmek istiyor musun?")){
removeImage(src, img);
}
}else{
openFull(src);
}
}

document.getElementById("gallery").appendChild(img);
}

// SİL
function removeImage(src, element){
let data = JSON.parse(localStorage.getItem("images") || "[]");
data = data.filter(i => i !== src);
localStorage.setItem("images", JSON.stringify(data));
element.remove();
}

// TÜMÜNÜ SİL
function clearAll(){
localStorage.removeItem("images");
location.reload();
}

// DRAG DROP
let drop = document.getElementById("dropZone");

drop.addEventListener("dragover", e => e.preventDefault());

drop.addEventListener("drop", e => {
e.preventDefault();
let file = e.dataTransfer.files[0];
let reader = new FileReader();
reader.onload = e => saveImage(e.target.result);
reader.readAsDataURL(file);
});

// FULLSCREEN
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeFull(){
document.getElementById("full").style.display="none";
}

// BAŞLANGIÇ
loadImages();

</script>

</body>
</html>
