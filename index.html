<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
background:url('https://images.unsplash.com/photo-1542728928-1413d1894ed1') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:-1;
}

.logo-img{
width:220px;
max-width:80%;
margin-bottom:15px;
filter: drop-shadow(0 0 10px #e1306c)
        drop-shadow(0 0 20px #e1306c)
        drop-shadow(0 0 30px #e1306c);
}

header{padding:60px 20px;}

.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
transition:.3s;
}
.btn:hover{transform:scale(1.05);}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.gallery img{
width:45%;
max-width:250px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{transform:scale(1.05);}

.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen img{width:90%;max-width:500px;}

.section{
padding:30px 20px;
background:rgba(0,0,0,0.6);
margin:20px;
border-radius:20px;
}

select{
padding:10px;
border-radius:10px;
margin:5px;
}

footer{
padding:30px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>

<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Rezervasyon</a>
</header>

<!-- FİYAT HESAPLAMA -->
<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut Seç</option>
<option value="2250">Küçük</option>
<option value="3000">Orta</option>
<option value="10000">Büyük</option>
</select>

<br>

<select id="style">
<option value="">Stil Seç</option>
<option value="8000">Minimal</option>
<option value="2500">Yazı</option>
<option value="2000">Realistik</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn">Fiyat Hesapla</button>

<h3 id="result"></h3>
</section>

<!-- GALERİ -->
<section class="section">
<h2>Örnek Dövmelerimiz</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
</div>
</section>

<section class="section">
<h2>Hakkımızda</h2>
<p>Burhaniye Tattoo olarak hijyenik ortamda kişiye özel dövme yapıyoruz.</p>
</section>

<section class="section">
<h2>Konum</h2>
<iframe src="https://www.google.com/maps?q=Burhaniye&output=embed"
width="90%" height="250" style="border-radius:20px;"></iframe>
</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeFull(){
document.getElementById("full").style.display="none";
}

function calcPrice(){
let size = document.getElementById("size").value;
let style = document.getElementById("style").value;

if(size == "" || style == ""){
document.getElementById("result").innerHTML = "Seçim yap!";
return;
}

let total = parseInt(size) + parseInt(style);

document.getElementById("result").innerHTML =
"Yaklaşık Fiyat: " + total + " ₺";
}
</script>

</body>
</html>
